<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#141a23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#98f5a7"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M0 140 H1280" stroke="#7ee787" stroke-width="1"/>
    <path d="M0 320 H1280" stroke="#7ee787" stroke-width="1"/>
    <path d="M0 500 H1280" stroke="#7ee787" stroke-width="1"/>
    <path d="M220 0 V640" stroke="#7ee787" stroke-width="1"/>
    <path d="M540 0 V640" stroke="#7ee787" stroke-width="1"/>
    <path d="M920 0 V640" stroke="#7ee787" stroke-width="1"/>
  </g>

  <g opacity="0.6">
    <circle cx="1040" cy="130" r="8" fill="#7ee787"/>
    <circle cx="1120" cy="130" r="8" fill="#7ee787"/>
    <circle cx="1200" cy="130" r="8" fill="#7ee787"/>
    <path d="M1048 130 H1112" stroke="#7ee787" stroke-width="2"/>
    <path d="M1128 130 H1192" stroke="#7ee787" stroke-width="2"/>
  </g>

  <g opacity="0.38">
