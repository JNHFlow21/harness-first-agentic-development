    <text x="111" y="117" fill="#d1f7d7" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">AI-FIRST METHOD</text>
  </g>

  <text x="80" y="240" fill="#f6f8fa" font-family="Helvetica, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-1.5">
    Harness-First
  </text>
  <text x="80" y="328" fill="url(#accent)" font-family="Helvetica, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-1.5" filter="url(#softGlow)">
    Agentic Development
  </text>

  <text x="82" y="392" fill="#c5d1de" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400">
    Humans steer. Agents execute.
  </text>

  <g opacity="0.9">
    <rect x="82" y="448" width="326" height="62" rx="18" fill="#121821" stroke="#30363d" stroke-width="1.2"/>
    <text x="112" y="487" fill="#f0f6fc" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Product harness</text>
    <rect x="430" y="448" width="302" height="62" rx="18" fill="#121821" stroke="#30363d" stroke-width="1.2"/>
    <text x="460" y="487" fill="#f0f6fc" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Quality harness</text>
    <rect x="754" y="448" width="366" height="62" rx="18" fill="#121821" stroke="#30363d" stroke-width="1.2"/>
    <text x="784" y="487" fill="#f0f6fc" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Deployment harness</text>
  </g>

  <g opacity="0.35">
    <path d="M410 479 H430" stroke="#7ee787" stroke-width="3"/>
    <path d="M734 479 H754" stroke="#7ee787" stroke-width="3"/>
